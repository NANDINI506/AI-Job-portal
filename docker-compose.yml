version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///./jobs.db
      - EMAIL_SENDER=${EMAIL_SENDER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
