services:
  job-portal:
    build: .
    container_name: job-portal-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./jobs.db
      - STATIC_DIR=/app/app/static
      - RESUMES_DIR=/app/resumes
      - TEMPLATES_DIR=/app/app/templates
    env_file:
      - .env
    volumes:
      - ./resumes:/app/resumes
      - ./jobs.db:/app/jobs.db
      - ./app/static:/app/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: job-portal-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - job-portal
    restart: unless-stopped
    profiles:
      - production

volumes:
  resumes_data:
  database_data:
