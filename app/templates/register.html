{% extends "base.html" %} {% block content %}
<div
  class="min-h-[70vh] flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-purple-100 py-8"
>
  <div
    class="w-full max-w-4xl bg-white rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden"
  >
    <!-- Illustration/Branding (hidden on mobile) -->
    <div
      class="hidden md:flex flex-col justify-center items-center bg-gradient-to-br from-blue-600 to-purple-600 text-white p-10 w-1/2"
    >
      <div class="mb-6">
        <span class="material-icons text-6xl">person_add</span>
      </div>
      <h2 class="text-3xl font-bold mb-2">Join Us!</h2>
      <p class="text-lg opacity-80">
        Create your account to start your job search journey.
      </p>
    </div>
    <!-- Register Form -->
    <div class="flex-1 flex flex-col justify-center p-8">
      <h1
        class="text-2xl font-bold mb-6 text-gray-800 text-center md:text-left"
      >
        Register
      </h1>
      {% if error %}
      <div class="bg-red-100 text-red-700 px-4 py-2 rounded mb-4 text-center">
        {{ error }}
      </div>
      {% endif %}
      <form method="POST" action="/register" class="space-y-4">
        <div>
          <label for="username" class="block text-gray-600 mb-1"
            >Username</label
          >
          <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <label for="email" class="block text-gray-600 mb-1">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <label for="password" class="block text-gray-600 mb-1"
            >Password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <label for="confirm_password" class="block text-gray-600 mb-1"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-lg font-semibold shadow hover:from-blue-700 hover:to-purple-700 transition"
        >
          Register
        </button>
      </form>
      <div class="text-center mt-6 text-gray-600">
        Already have an account?
        <a href="/login" class="text-blue-600 hover:underline font-semibold"
          >Login here</a
        >
      </div>
    </div>
  </div>
</div>
{% endblock %}
