{% extends "base.html" %} {% block content %}
<div
  class="flex justify-center items-center min-h-[60vh] bg-gradient-to-br from-red-50 via-white to-yellow-100 py-8"
>
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-red-600 mb-4">Error</h1>
      <div
        class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6"
      >
        {{ message }}
      </div>
      <div class="flex flex-col md:flex-row justify-center gap-4 mt-4">
        <a
          href="/dashboard"
          class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg font-semibold shadow hover:bg-gray-300 transition"
          >Back to Dashboard</a
        >
        {% if "resume" in message.lower() %}
        <a
          href="/upload_resume"
          class="bg-blue-100 text-blue-700 px-6 py-2 rounded-lg font-semibold shadow hover:bg-blue-200 transition"
          >Upload Resume</a
        >
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
